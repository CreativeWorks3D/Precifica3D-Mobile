<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f97316">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Precifica3D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Precifica3D — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:"Space Grotesk",sans-serif;
  background:#0d0d0f;
  color:#f0f0f5;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#splash{
  position:fixed;inset:0;background:#0d0d0f;
  display:flex;align-items:center;justify-content:center;
  z-index:99999;
}
.splash-spinner{
  width:36px;height:36px;
  border:3px solid #2a2a35;
  border-top-color:#f97316;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.login-box{opacity:0;transition:opacity 0.2s;}
.login-box.visible{opacity:1;}
.login-box{
  background:#16161a;
  border:1px solid #2a2a35;
  border-radius:20px;
  padding:2rem 1.5rem;
  width:100%;
  max-width:380px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.1rem;
}
.login-logo{
  width:80px;height:80px;
  background:rgba(249,115,22,0.15);
  border:1px solid #f97316;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:0.25rem;
}
.login-title{font-size:24px;font-weight:700;color:#f0f0f5;letter-spacing:-0.02em;}
.login-sub{font-size:14px;color:#8888a0;margin-top:-0.5rem;}
.login-field{width:100%;display:flex;flex-direction:column;gap:7px;}
.login-field label{
  font-size:12px;font-weight:600;color:#8888a0;
  text-transform:uppercase;letter-spacing:0.06em;
}
.login-field input{
  width:100%;
  padding:14px 16px;
  background:#1e1e24;
  border:1px solid #2a2a35;
  border-radius:12px;
  color:#f0f0f5;
  font-family:"Space Grotesk",sans-serif;
  font-size:16px;
  outline:none;
  transition:border-color 0.2s;
  -webkit-appearance:none;
}
.login-field input:focus{border-color:#f97316;}
.login-btn{
  width:100%;
  padding:15px;
  background:#f97316;
  border:none;
  border-radius:12px;
  color:#000;
  font-family:"Space Grotesk",sans-serif;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:0.25rem;
  min-height:52px;
}
.login-btn:disabled{opacity:0.5;}
.login-error{
  width:100%;padding:12px 16px;
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);
  border-radius:10px;color:#ef4444;
  font-size:14px;text-align:center;display:none;
  line-height:1.4;
}
.login-success{
  width:100%;padding:12px 16px;
  background:rgba(34,197,94,0.1);
  border:1px solid rgba(34,197,94,0.3);
  border-radius:10px;color:#22c55e;
  font-size:14px;text-align:center;display:none;
  line-height:1.4;
}
.login-loading{
  color:#8888a0;font-size:14px;
  display:none;align-items:center;gap:10px;
}
.spinner{
  width:20px;height:20px;
  border:2px solid #2a2a35;
  border-top-color:#f97316;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}
.login-forgot{
  font-size:13px;color:#8888a0;
  background:none;border:none;cursor:pointer;
  text-decoration:underline;
  font-family:"Space Grotesk",sans-serif;
  padding:4px;
  min-height:44px;
  display:flex;align-items:center;
}
.login-footer{
  font-size:12px;color:#55556a;
  text-align:center;margin-top:0.25rem;
}
</style>
</head>
<body>

<div id="splash"><div class="splash-spinner"></div></div>
<div class="login-box" id="login-box">
  <div class="login-logo">
    <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="24" width="24" height="4" rx="2" fill="#f97316" opacity="0.35"/>
      <rect x="4" y="8" width="3" height="17" rx="1.5" fill="#f97316" opacity="0.6"/>
      <rect x="4" y="8" width="18" height="3" rx="1.5" fill="#f97316"/>
      <rect x="17" y="8" width="4" height="7" rx="1.5" fill="#f97316"/>
      <path d="M18.5 15 L19 18 L19.5 15" stroke="#f97316" stroke-width="1.2" fill="#f97316"/>
      <rect x="8" y="21" width="10" height="3" rx="1" fill="#f97316" opacity="0.5"/>
      <rect x="9" y="18" width="8" height="3" rx="1" fill="#f97316" opacity="0.4"/>
      <rect x="10" y="15.5" width="6" height="2.5" rx="1" fill="#f97316" opacity="0.65"/>
    </svg>
  </div>

  <div class="login-title">Precifica3D</div>
  <div class="login-sub">Faça login para acessar</div>

  <div class="login-field">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" autocapitalize="none">
  </div>

  <div class="login-field">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="login-error" id="login-error"></div>
  <div class="login-success" id="login-success"></div>
  <div class="login-loading" id="login-loading">
    <div class="spinner"></div>
    Verificando...
  </div>

  <button class="login-btn" id="login-btn" onclick="fazerLogin()">Entrar</button>
  <button class="login-forgot" onclick="esqueceuSenha()">Esqueci minha senha</button>
  <div class="login-footer">Creative Works 3D &copy; 2024</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB_TmUQN_JQwYh-QQzdmehMhqe1Apnqwv8",
    authDomain: "calculadora3d-5d2db.firebaseapp.com",
    projectId: "calculadora3d-5d2db",
    storageBucket: "calculadora3d-5d2db.firebasestorage.app",
    messagingSenderId: "40753148792",
    appId: "1:40753148792:web:3093b0d1ed1dc9a4ea8e8d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const MAX_DISPOSITIVOS = 2;

  // Detecta informacoes do dispositivo
  function getDeviceInfo() {
    const ua = navigator.userAgent;
    let dispositivo = "Desconhecido";
    let navegador = "Desconhecido";

    // Detecta dispositivo
    if (/iPhone/.test(ua)) dispositivo = "iPhone";
    else if (/iPad/.test(ua)) dispositivo = "iPad";
    else if (/Android/.test(ua) && /Mobile/.test(ua)) dispositivo = "Android";
    else if (/Android/.test(ua)) dispositivo = "Tablet Android";
    else if (/Mac/.test(ua)) dispositivo = "Mac";
    else if (/Windows/.test(ua)) dispositivo = "Windows";
    else if (/Linux/.test(ua)) dispositivo = "Linux";

    // Detecta navegador
    if (/CriOS/.test(ua)) navegador = "Chrome (iOS)";
    else if (/FxiOS/.test(ua)) navegador = "Firefox (iOS)";
    else if (/EdgA/.test(ua)) navegador = "Edge";
    else if (/OPR/.test(ua)) navegador = "Opera";
    else if (/Chrome/.test(ua) && !/Chromium/.test(ua)) navegador = "Chrome";
    else if (/Safari/.test(ua) && !/Chrome/.test(ua)) navegador = "Safari";
    else if (/Firefox/.test(ua)) navegador = "Firefox";
    else if (/Edg/.test(ua)) navegador = "Edge";

    // Data formatada
    const agora = new Date();
    const data = agora.toLocaleDateString("pt-BR") + " " + agora.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});

    return { dispositivo, navegador, data };
  }

  function getDeviceId() {
    let id = localStorage.getItem("calc3d_device_id");
    if (!id) {
      id = "dev_" + Math.random().toString(36).substr(2, 9) + "_" + Date.now();
      localStorage.setItem("calc3d_device_id", id);
    }
    return id;
  }

  async function verificarDispositivo(uid) {
    const deviceId = getDeviceId();
    const info = getDeviceInfo();
    const ref = doc(db, "dispositivos", uid);
    const snap = await getDoc(ref);

    const novoDispositivo = {
      id: deviceId,
      dispositivo: info.dispositivo,
      navegador: info.navegador,
      primeiro_acesso: info.data
    };

    if (!snap.exists()) {
      await setDoc(ref, { lista: [novoDispositivo] });
      return true;
    }

    const lista = snap.data().lista || [];
    const jaExiste = lista.find(d => d.id === deviceId);
    if (jaExiste) return true;
    if (lista.length >= MAX_DISPOSITIVOS) return false;

    await updateDoc(ref, { lista: [...lista, novoDispositivo] });
    return true;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const permitido = await verificarDispositivo(user.uid);
      if (permitido) {
        window.location.href = "calculadora.html";
      } else {
        await auth.signOut();
        document.getElementById("splash").style.display = "none";
        document.getElementById("login-box").classList.add("visible");
        const erro = document.getElementById("login-error");
        erro.textContent = "Limite de dispositivos atingido. Entre em contato com o suporte.";
        erro.style.display = "block";
      }
    } else {
      document.getElementById("splash").style.display = "none";
      document.getElementById("login-box").classList.add("visible");
    }
  });

  window.fazerLogin = async function() {
    const email = document.getElementById("login-email").value.trim();
    const senha = document.getElementById("login-senha").value;
    const btn = document.getElementById("login-btn");
    const erro = document.getElementById("login-error");
    const sucesso = document.getElementById("login-success");
    const loading = document.getElementById("login-loading");

    erro.style.display = "none";
    sucesso.style.display = "none";

    if(!email || !senha){
      erro.textContent = "Preencha e-mail e senha.";
      erro.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.style.display = "none";
    loading.style.display = "flex";

    try {
      const cred = await signInWithEmailAndPassword(auth, email, senha);
      const permitido = await verificarDispositivo(cred.user.uid);
      if (!permitido) {
        await auth.signOut();
        erro.textContent = "Limite de 2 dispositivos atingido. Entre em contato com o suporte para trocar de dispositivo.";
        erro.style.display = "block";
        loading.style.display = "none";
        btn.style.display = "block";
        btn.disabled = false;
        return;
      }
      sucesso.textContent = "Login realizado! Redirecionando...";
      sucesso.style.display = "block";
      setTimeout(() => { window.location.href = "calculadora.html"; }, 800);
    } catch(e) {
      erro.textContent = "E-mail ou senha incorretos. Tente novamente.";
      erro.style.display = "block";
      loading.style.display = "none";
      btn.style.display = "block";
      btn.disabled = false;
    }
  };

  document.getElementById("login-senha").addEventListener("keydown", (e) => {
    if(e.key === "Enter") window.fazerLogin();
  });
  document.getElementById("login-email").addEventListener("keydown", (e) => {
    if(e.key === "Enter") document.getElementById("login-senha").focus();
  });

  window.esqueceuSenha = async function() {
    const email = document.getElementById("login-email").value.trim();
    const erro = document.getElementById("login-error");
    const sucesso = document.getElementById("login-success");
    erro.style.display = "none";
    sucesso.style.display = "none";
    if(!email){
      erro.textContent = "Digite seu e-mail acima para redefinir a senha.";
      erro.style.display = "block";
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      sucesso.textContent = "E-mail de redefinicao enviado! Verifique sua caixa de entrada.";
      sucesso.style.display = "block";
    } catch(e) {
      erro.textContent = "Nao foi possivel enviar o e-mail. Verifique o endereco digitado.";
      erro.style.display = "block";
    }
  };
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
